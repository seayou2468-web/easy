name: build-ios18

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-ios-device:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Pull git-lfs objects
        run: git lfs pull

      - name: Select Xcode 16.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate --spec project.yml

      - name: Build liblcf static library (iOS device, standalone)
        run: |
          xcodebuild \
            -project easyrpg-ios.xcodeproj \
            -scheme liblcf \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            build





      - name: Build unsigned iOS app (.app)
        run: |
          xcodebuild \
            -project easyrpg-ios.xcodeproj \
            -scheme EasyRPGPlayer-iOS \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY= \
            build

      - name: Package unsigned .ipa
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -path '*/Build/Products/Release-iphoneos/*.app' -print -quit)
          test -n "$APP_PATH"
          rm -rf /tmp/Payload /tmp/EasyRPGPlayer.app
          mkdir -p /tmp/Payload
          cp -R "$APP_PATH" /tmp/EasyRPGPlayer.app
          cp -R /tmp/EasyRPGPlayer.app /tmp/Payload/
          (cd /tmp && /usr/bin/zip -qry easyrpg-ios-unsigned.ipa Payload)
          test -f /tmp/easyrpg-ios-unsigned.ipa

      - name: Upload iOS app artifacts
        uses: actions/upload-artifact@v4
        with:
          name: easyrpg-ios-unsigned-artifacts
          path: |
            /tmp/easyrpg-ios-unsigned.ipa
            /tmp/EasyRPGPlayer.app
